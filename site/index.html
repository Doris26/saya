    :root:not([data-theme]){ --bg1:#0a0c14; --bg2:#0e1018; --fg:#f2f4fb; --sub:#9aa3ba;
      --line:rgba(255,255,255,.12); --card:rgba(255,255,255,.06); --card-brd:rgba(255,255,255,.14);
      --shadow:0 24px 70px rgba(0,0,0,.5); }
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{ margin:0; color:var(--fg);
    background:radial-gradient(1200px 800px at 70% 60%, var(--bg2), var(--bg1));
    font-family:'Poppins',-apple-system,"PingFang SC","SF Pro Display",BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100dvh;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    gap:1.4rem; padding:clamp(2rem,6vh,4rem) 1.5rem 3rem; text-align:center; overflow-x:hidden; }

  .lockup{ display:flex; align-items:center; gap:.6rem; }
  .lockup img{ width:clamp(52px,9vw,64px); height:auto; border-radius:16px;
    box-shadow:0 10px 24px rgba(60,54,120,.35), 0 2px 4px rgba(60,54,120,.25),
      inset 0 2px 2px rgba(255,255,255,.5), inset 0 -2px 3px rgba(0,0,0,.15); }
  .lockup .name{ font-size:clamp(2.4rem,8vw,3.6rem); font-weight:700; letter-spacing:-.02em; line-height:1;
    background:linear-gradient(100deg,var(--teal),var(--indigo));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }

  .headline{ font-size:clamp(2.4rem,7.5vw,4rem); font-weight:800; letter-spacing:-.03em; line-height:1.02;
    margin:.4rem 0 0; text-wrap:balance; }
  .headline .grad{ background:linear-gradient(100deg,var(--teal),var(--blue),var(--indigo));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }

  .sub{ color:var(--sub); font-size:clamp(1rem,2.6vw,1.22rem); line-height:1.5; margin:.2rem 0 0; max-width:30ch; }
  .sub .en{ color:var(--teal); font-weight:600; } .sub .zh{ color:var(--indigo); font-weight:600; }

  .stage{ position:relative; cursor:pointer; width:min(760px,96vw); }
  canvas{ display:block; width:100%; height:230px; }
  .replay{ display:inline-flex; align-items:center; gap:.5rem; color:var(--sub); font-size:.92rem; margin:.2rem 0 0; }
  .replay svg{ width:20px; height:20px; }
  .stage.live ~ .replay{ color:var(--teal); }

  /* 立体玻璃:顶部亮斜面高光 + 底部内阴影 = 厚度感 + 外投影 = 悬浮 */
  .field{ width:min(720px,96vw); display:flex; align-items:center; gap:.9rem;
    padding:1.1rem 1.35rem; border-radius:22px;
    background:linear-gradient(158deg, rgba(255,255,255,.9), rgba(255,255,255,.6) 55%, rgba(255,255,255,.78));
    border:1px solid rgba(255,255,255,.9);
    box-shadow:
      0 30px 60px rgba(60,54,120,.22),
      0 6px 14px rgba(60,54,120,.14),
      inset 0 2px 3px rgba(255,255,255,.95),
      inset 0 -3px 6px rgba(80,74,140,.14);
    backdrop-filter:blur(22px) saturate(1.4); -webkit-backdrop-filter:blur(22px) saturate(1.4);
    text-align:left; margin-top:.4rem; }
  :root[data-theme="dark"] .field, :root:not([data-theme]) .field{}
  @media (prefers-color-scheme: dark){ :root:not([data-theme]) .field{
    background:linear-gradient(158deg, rgba(255,255,255,.12), rgba(255,255,255,.03) 55%, rgba(255,255,255,.07));
    border-color:rgba(255,255,255,.16);
    box-shadow:0 30px 60px rgba(0,0,0,.5), inset 0 2px 3px rgba(255,255,255,.35), inset 0 -3px 6px rgba(0,0,0,.4); } }
  :root[data-theme="dark"] .field{
    background:linear-gradient(158deg, rgba(255,255,255,.12), rgba(255,255,255,.03) 55%, rgba(255,255,255,.07));
    border-color:rgba(255,255,255,.16);
    box-shadow:0 30px 60px rgba(0,0,0,.5), inset 0 2px 3px rgba(255,255,255,.35), inset 0 -3px 6px rgba(0,0,0,.4); }
  .field .avatar{ flex:0 0 auto; width:40px; height:40px; border-radius:50%;
    background:linear-gradient(135deg,var(--teal),var(--indigo)); display:flex; align-items:center; justify-content:center; }
  .field .avatar svg{ width:22px; height:22px; }
  .field .txt{ font-size:clamp(1.02rem,2.8vw,1.32rem); line-height:1.45; font-weight:500; }
  .field .txt .k1{ color:var(--teal); font-weight:700; }
  .field .txt .k2{ color:var(--indigo); font-weight:700; }
  .field .txt .k3{ color:var(--blue); font-weight:700; }
  .caret{ display:inline-block; width:2px; height:1.1em; background:var(--teal); margin-left:1px;
    vertical-align:text-bottom; animation:blink 1s steps(1) infinite; }
  @keyframes blink{ 50%{opacity:0} }

  .cta{ display:flex; gap:.9rem; flex-wrap:wrap; justify-content:center; margin-top:.6rem; }
  .btn{ display:inline-flex; align-items:center; gap:.6rem; text-decoration:none; font-weight:700;
    padding:.85rem 1.7rem; border-radius:16px; transition:transform .15s ease, box-shadow .15s ease; }
  .btn svg{ width:20px; height:20px; }
  .btn:hover{ transform:translateY(-2px) }
  .btn:focus-visible{ outline:2px solid var(--teal); outline-offset:3px }
  .btn.primary{ color:var(--btn-fg); background:linear-gradient(150deg,var(--teal),var(--blue) 55%,var(--indigo));
    box-shadow:0 14px 30px rgba(108,92,231,.45), 0 4px 8px rgba(108,92,231,.3),
      inset 0 2px 2px rgba(255,255,255,.5), inset 0 -3px 6px rgba(60,40,140,.35); }
  .btn.primary small{ display:block; font-weight:500; font-size:.68rem; opacity:.85; margin-top:1px; }
  .btn.primary .lab{ font-size:1.05rem; line-height:1; }
  .btn.ghost{ color:var(--fg); font-size:1.02rem;
    background:linear-gradient(158deg, rgba(255,255,255,.92), rgba(255,255,255,.7));
    border:1px solid rgba(255,255,255,.9);
    box-shadow:0 14px 30px rgba(60,54,120,.18), inset 0 2px 2px rgba(255,255,255,.95), inset 0 -2px 4px rgba(80,74,140,.12); }
  @media (prefers-color-scheme: dark){ :root:not([data-theme]) .btn.ghost{ background:linear-gradient(158deg,rgba(255,255,255,.12),rgba(255,255,255,.04)); border-color:rgba(255,255,255,.16); box-shadow:0 14px 30px rgba(0,0,0,.45), inset 0 2px 2px rgba(255,255,255,.3); } }
  :root[data-theme="dark"] .btn.ghost{ background:linear-gradient(158deg,rgba(255,255,255,.12),rgba(255,255,255,.04)); border-color:rgba(255,255,255,.16); box-shadow:0 14px 30px rgba(0,0,0,.45), inset 0 2px 2px rgba(255,255,255,.3); }

  .foot{ color:var(--sub); font-size:.9rem; margin:.6rem 0 0; }
  .foot .g{ background:linear-gradient(100deg,var(--teal),var(--indigo));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; font-weight:600; }

  .reveal{ opacity:0; transform:translateY(14px); animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
  .r1{animation-delay:.05s} .r2{animation-delay:.15s} .r3{animation-delay:.25s}
  .r4{animation-delay:.38s} .r5{animation-delay:.5s} .r6{animation-delay:.62s} .r7{animation-delay:.74s}
  @keyframes rise{ to{opacity:1; transform:none} }
  @media (prefers-reduced-motion:reduce){ .reveal{animation:none; opacity:1; transform:none} .btn{transition:none} .caret{animation:none} }
</style>
</head>

(function(){

  let W,H,DPR;
  function size(){ DPR=Math.min(devicePixelRatio||1,2); W=c.clientWidth; H=c.clientHeight;
    c.width=W*DPR; c.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
  size(); addEventListener('resize', size);

  // 背景氛围:流动光带丝线 + 散落柔光粒子(照 reference 细节)
  const PARTS=Array.from({length:22},()=>({x:Math.random(),y:Math.random(),r:1+Math.random()*2.4,ph:Math.random()*6.28,sp:0.25+Math.random()*0.5}));
  function ribbon(yb,amp,freq,speed,phase,alpha){
    ctx.beginPath();
    for(let x=0;x<=W;x+=6){ const u=x/W; const fade=Math.pow(Math.sin(Math.PI*u),0.7);
      const y=yb+Math.sin(u*freq+t*speed+phase)*amp*fade; x?ctx.lineTo(x,y):ctx.moveTo(x,y); }
    const g=ctx.createLinearGradient(0,0,W,0);
    g.addColorStop(0,'rgba(150,190,255,0)'); g.addColorStop(.5,`rgba(150,195,255,${alpha})`); g.addColorStop(1,'rgba(150,190,255,0)');

  function bg(){
    // 光带(偏右侧密,像 reference)
    ribbon(H*0.30,14,7,0.6,0,0.16); ribbon(H*0.62,18,5.5,-0.5,2,0.13); ribbon(H*0.5,10,9,0.8,4,0.10);
    // 粒子
    for(const p of PARTS){ const px=p.x*W, py=p.y*H+Math.sin(t*p.sp+p.ph)*6;
      const a=0.12+0.22*(0.5+0.5*Math.sin(t*p.sp*1.6+p.ph)); const R=p.r*4.5;
      const rg=ctx.createRadialGradient(px,py,0,px,py,R);
      rg.addColorStop(0,`rgba(150,200,255,${a})`); rg.addColorStop(1,'rgba(150,200,255,0)');
      ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(px,py,R,0,6.2832); ctx.fill(); }
  }
  // 三色停点(RGB)——按位置插值出每根柱的底色
  const C1=[45,212,191], C2=[79,157,255], C3=[125,108,240];
  function lerp(a,b,t){ return [Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)]; }
  function hue(u){ return u<0.5 ? lerp(C1,C2,u*2) : lerp(C2,C3,(u-0.5)*2); }
  function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); ctx.fill(); }
  // 严格按 reference:通体柔和渐变的果冻柱,顶端更亮、底部略深,细微圆柱高光(非白条)
  function glassBar(x,y,w,h,col){
    const [r,g,b]=col;
    const lt=(k)=>[Math.min(r+k,255),Math.min(g+k,255),Math.min(b+k,255)];
    // 纵向:顶端提亮(受光)→ 底部本色,像发光果冻
    const vg=ctx.createLinearGradient(x,y,x,y+h);
    const top=lt(70), bot=col;
    vg.addColorStop(0,`rgb(${top[0]},${top[1]},${top[2]})`);
    vg.addColorStop(0.5,`rgb(${r},${g},${b})`);
    vg.addColorStop(1,`rgb(${bot[0]},${bot[1]},${bot[2]})`);
    ctx.fillStyle=vg; rr(x,y,w,h,w/2);
    // 极窄的圆柱受光边(左侧偏亮),很淡,营造圆润而不生硬
    const hg=ctx.createLinearGradient(x,0,x+w,0);
    hg.addColorStop(0,`rgba(255,255,255,0.28)`);
    hg.addColorStop(0.35,`rgba(255,255,255,0.06)`);
    hg.addColorStop(1,`rgba(0,0,0,0.06)`);
    ctx.fillStyle=hg; rr(x,y,w,h,w/2);
  }
  const BARS=44, smooth=new Array(BARS).fill(0); let t=0, talking=false, energy=0;
  // 真实语音波形包络:两簇高峰 + 中间起伏 + 两端渐隐成小点(照 reference)
  function envelope(u){
    const edge=Math.pow(Math.sin(Math.PI*Math.min(1,Math.max(0,u))),0.55); // 两端 taper
    const l1=Math.exp(-Math.pow((u-0.23)/0.15,2))*0.9;   // 左中主峰
    const l2=Math.exp(-Math.pow((u-0.71)/0.13,2))*1.05;  // 右主峰
    const l3=Math.exp(-Math.pow((u-0.46)/0.10,2))*0.35;  // 中间小起伏
    return edge*(0.14 + l1 + l2 + l3);
  }
  function frame(){ ctx.clearRect(0,0,W,H); const mid=H/2, gap=W/BARS; energy*=0.9;
    bg();  // 先画背景光带 + 粒子
    const swell = talking ? (0.82+energy*0.7) : (0.74+0.1*Math.sin(t*0.8));
    // 柔和辉光 = 玻璃发光感
    ctx.save(); ctx.shadowBlur=20; ctx.shadowColor='rgba(110,150,250,0.5)';
    for(let i=0;i<BARS;i++){ const u=i/(BARS-1);
      // detail 保底更高,柱子饱满不塌陷(避免参差)
      const detail=0.66 + 0.34*Math.abs(0.6*Math.sin(i*0.9 - t*(talking?4:1.4)) + 0.4*Math.sin(i*0.47 + t*(talking?3:1)));
      const tg=envelope(u)*detail*swell;
      smooth[i]+=(tg-smooth[i])*(talking?0.5:0.12);
      const w=Math.max(3,gap*0.32), h=Math.max(w,smooth[i]*H*0.98);
      glassBar(i*gap+gap*0.5-w/2, mid-h/2, w, h, hue(u)); }  // ← 玻璃棒
    ctx.restore();
    t+=reduce?0:0.016; requestAnimationFrame(frame); }
  frame();

  let playing=false;
  function play(){ if(playing) return; playing=true; stage.classList.add('live'); replayTxt.textContent='Listening…';
    typed.textContent=''; talking=true;
    const chars=[...PLAIN], total=3400, start=performance.now(); let shown=0;
    (function type(now){ const p=Math.min(1,((now||performance.now())-start)/total); const want=Math.floor(p*chars.length);
      if(want>shown){ shown=want; typed.textContent=chars.slice(0,shown).join(''); energy=Math.min(1,energy+0.5); }
      if(p<1) requestAnimationFrame(type); else finish(); })(start);
    function finish(){ typed.innerHTML=HTMLTXT; talking=false; playing=false; stage.classList.remove('live'); replayTxt.textContent='Click to replay'; }
  }
  const replayBtn=document.getElementById('replay');
  [stage,replayBtn].forEach(el=>{
    el.addEventListener('click', play);
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); play(); }});
  });
  if('speechSynthesis' in window){ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices(); }
})();
</script>
